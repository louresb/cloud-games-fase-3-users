apiVersion: v1
kind: Secret
metadata:
  name: users-secret
  namespace: fcg-apps
  labels:
    app: users-api
stringData:
  # Placeholders for sensitive configuration values
  # Database connection string 
  ConnectionStrings__DefaultConnection: "Server=sqlserver-service;Database=UsersDb;User Id=sa;Password=YOUR_PASSWORD;TrustServerCertificate=True;Encrypt=False;"
  # RabbitMQ credentials
  RabbitMq__UserName: "guest"
  RabbitMq__Password: "guest"
  # JWT sensitive secret
  Jwt__Secret: "your-256-bit-secret"
  # Admin user for seeding
  AdminUser__Name: "Administrador"
  AdminUser__Email: "adm@fcg.com"
  AdminUser__Password: "YOUR_PASSWORD"
  AdminUser__Role: "Administrator"
  AdminUser__Status: "Active"
  AdminUser__EmailConfirmed: "true"